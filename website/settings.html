<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - StockAI</title>
    <script src="/theme-init.js"></script>
    <script src="/config.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/global.css">
    <link rel="stylesheet" href="/settings.css">
</head>
<body>
    <main class="main-content" id="mainContent">
        <h1 class="page-title">Settings</h1>

        <div class="settings-tabs">
            <button class="tab-btn active" data-tab="theme">Theme</button>
            <button class="tab-btn" data-tab="profile">Profile</button>
            <button class="tab-btn" data-tab="data">Data</button>
        </div>

        <!-- PROFILE TAB -->
        <div class="tab-panel" id="tab-profile">
            <div class="section-card">
                <h3>Your Profile</h3>
                <div class="form-row">
                    <label>Display Name</label>
                    <input type="text" id="profileName" placeholder="Your name">
                </div>
                <div class="form-row">
                    <label>Email</label>
                    <input type="email" id="profileEmail" disabled>
                </div>
                <button class="btn btn-primary" id="saveProfileBtn" onclick="saveProfile()">Save Changes</button>
                <div class="msg" id="profileMsg"></div>
            </div>

            <div class="section-card">
                <h3>Change Password</h3>
                <div class="form-row">
                    <label>New Password</label>
                    <input type="password" id="newPassword" placeholder="Min 6 characters" minlength="6">
                </div>
                <div class="form-row">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" placeholder="Repeat password" minlength="6">
                </div>
                <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
                <div class="msg" id="passwordMsg"></div>
            </div>
        </div>

        <!-- THEME TAB -->
        <div class="tab-panel active" id="tab-theme">
            <div class="section-card">
                <h3>Theme Presets</h3>
                <div class="presets-grid" id="presetsGrid"></div>
            </div>

            <div class="section-card">
                <h3>Custom Colors</h3>
                <div id="colorPickers"></div>
                <div style="display:flex;gap:10px;margin-top:16px">
                    <button class="btn btn-outline" onclick="resetTheme()">Reset to Default</button>
                </div>
                <div class="msg" id="themeMsg"></div>
            </div>
        </div>

        <!-- DATA TAB -->
        <div class="tab-panel" id="tab-data">
            <div class="section-card">
                <h3>Your Categories</h3>
                <div id="categoriesList"><div class="empty-msg">Loading...</div></div>
            </div>

            <div class="section-card">
                <h3>Import Data</h3>
                <p style="font-size:13px;color:var(--clr-text-secondary);margin-bottom:14px">Upload a CSV file to add items to an existing category. Column headers must match the category's field names.</p>
                <div class="import-row">
                    <select id="importTableSelect">
                        <option value="">Select category…</option>
                    </select>
                    <input type="file" id="importFileInput" accept=".csv">
                    <button class="btn btn-primary" onclick="importCategoryData()">Import</button>
                </div>
                <p class="import-hint">Tip: Export a category first to see the expected column format.</p>
                <div class="msg" id="dataMsg"></div>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script src="sidebar.js"></script>
    <script src="settings.js"></script>
    <script src="ai-assistant-v4.js"></script>
</body>
</html>

<!-- ============================================================
     1. SETUP — tells the browser what this file is and how to read it
     ============================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockAI - Login</title>

    <!-- ============================================================
         2. HEAD DEPENDENCIES — config + Supabase library + shared CSS
         must load before anything else touches window.supabase or relies on global styles
         ============================================================ -->
    <script src="/config.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="/global.css">

    <!-- ============================================================
         3. CSS STYLES — landing-page-specific styling
         (login card, tab switcher, form fields, buttons)
         ============================================================ -->
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 40px 30px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .header-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid #f0f0f0;
            padding: 0;
            background: #fafafa;
        }

        .tab-button {
            flex: 1;
            padding: 16px;
            border: none;
            background: transparent;
            color: #999;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
        }

        .tab-button:hover {
            color: #667eea;
            background: #f5f5f5;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-content {
            padding: 30px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .forgot-password {
            text-align: right;
            margin-bottom: 24px;
        }

        .forgot-password a,
        .back-to-login a {
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .forgot-password a:hover,
        .back-to-login a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .submit-button {
            width: 100%;
            padding: 12px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 16px;
            font-family: inherit;
        }

        .submit-button:hover:not(:disabled) {
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .submit-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .message {
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 13px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: #fee;
            color: #c33;
            border: 1px solid #fdd;
        }

        .message.success {
            background: #efe;
            color: #3c3;
            border: 1px solid #dfd;
        }

        .message.info {
            background: #eef;
            color: #33c;
            border: 1px solid #ddf;
        }

        .back-to-login {
            text-align: center;
            margin-top: 16px;
        }

        .separator {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .header {
                padding: 30px 24px 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .tab-content {
                padding: 24px;
            }

            .container {
                max-width: 100%;
            }
        }
    </style>
</head>

<!-- ============================================================
     4. BODY — the login / signup / password-reset UI
     single card with tab switcher for Sign In vs Sign Up
     `loaded` class is set inline: landing has no async setup to hide,
     so it can be visible immediately (no fade-in gate needed).
     ============================================================ -->
<body class="loaded">
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round" style="width:56px;height:56px;color:#667eea">
                    <polygon points="50,10 90,30 90,70 50,90 10,70 10,30" stroke="currentColor" fill="none"/>
                    <polyline points="10,30 50,50 90,30"/>
                    <line x1="50" y1="50" x2="50" y2="90"/>
                  </svg>
                </div>
                <h1>StockAI</h1>
                <p>The database that builds itself.</p>
                <p style="margin-top:8px"><a href="about.html" style="font-size:13px;color:#667eea;text-decoration:none;opacity:0.8">Learn more →</a></p>
            </div>

            <div class="tabs">
                <button class="tab-button active" data-tab="login">Login</button>
                <button class="tab-button" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Tab -->
            <div id="login" class="tab-content active">
                <div id="login-message"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                    </div>
                    <div class="forgot-password">
                        <a id="forgot-password-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="submit-button" id="login-button">Sign In</button>
                </form>

                <div id="forgot-password-form" style="display: none;">
                    <div id="reset-message"></div>
                    <div class="form-group">
                        <label for="reset-email">Email Address</label>
                        <input type="email" id="reset-email" placeholder="you@example.com" required>
                    </div>
                    <button type="button" class="submit-button" id="reset-button">Send Reset Link</button>
                    <div class="back-to-login">
                        <a id="back-to-login-link">Back to login</a>
                    </div>
                </div>

                <div id="new-password-form" style="display: none;">
                    <h3 style="margin-bottom: 16px; font-size: 18px;">Set New Password</h3>
                    <div id="new-password-message"></div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" placeholder="••••••••" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password-confirm">Confirm Password</label>
                        <input type="password" id="new-password-confirm" placeholder="••••••••" minlength="6" required>
                    </div>
                    <button type="button" class="submit-button" id="new-password-button">Update Password</button>
                </div>
            </div>

            <!-- Sign Up Tab -->
            <div id="signup" class="tab-content">
                <div id="signup-message"></div>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-name">Display Name</label>
                        <input type="text" id="signup-name" name="display_name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password" placeholder="••••••••" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" name="confirm_password" placeholder="••••••••" minlength="6" required>
                    </div>
                    <button type="submit" class="submit-button" id="signup-button">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ============================================================
         5. AUTH SCRIPT — Supabase login / signup / password-reset logic
         tab switching, form handlers, session check on page load
         ============================================================ -->
    <script>
        // Initialize Supabase
        const SUPABASE_URL = window.SUPABASE_URL;
        const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;

        const { createClient } = window.supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if already logged in
        async function checkExistingSession() {
            try {
                if (window.location.hash.includes('type=recovery')) return;
                const { data } = await db.auth.getSession();
                if (data.session) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        }

        // Tab switching
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');

        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                const tabName = button.getAttribute('data-tab');

                // Remove active class from all buttons and contents
                tabButtons.forEach(btn => btn.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));

                // Add active class to clicked button and corresponding content
                button.classList.add('active');
                document.getElementById(tabName).classList.add('active');

                // Clear messages when switching tabs
                clearMessages();
            });
        });

        // Message display functions
        function showMessage(elementId, message, type) {
            const messageDiv = document.getElementById(elementId);
            messageDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
        }

        function clearMessages() {
            document.getElementById('login-message').innerHTML = '';
            document.getElementById('signup-message').innerHTML = '';
            document.getElementById('reset-message').innerHTML = '';
        }

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const button = document.getElementById('login-button');

            clearMessages();
            button.disabled = true;
            button.textContent = 'Signing in...';

            try {
                const { data, error } = await db.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    showMessage('login-message', error.message, 'error');
                } else {
                    showMessage('login-message', 'Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                }
            } catch (error) {
                showMessage('login-message', 'An unexpected error occurred. Please try again.', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Sign In';
            }
        });

        // Sign up form handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const displayName = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm').value;
            const button = document.getElementById('signup-button');

            clearMessages();

            if (password !== confirmPassword) {
                showMessage('signup-message', 'Passwords do not match.', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('signup-message', 'Password must be at least 6 characters long.', 'error');
                return;
            }

            button.disabled = true;
            button.textContent = 'Creating account...';

            try {
                const { data, error } = await db.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            display_name: displayName
                        }
                    }
                });

                if (error) {
                    showMessage('signup-message', error.message, 'error');
                } else if (data.user && data.session) {
                    // Auto-confirmed signup
                    showMessage('signup-message', 'Account created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    // Email confirmation required
                    showMessage('signup-message', 'Account created! Check your email for a confirmation link to complete sign up.', 'success');
                    document.getElementById('signup-form').reset();
                }
            } catch (error) {
                showMessage('signup-message', 'An unexpected error occurred. Please try again.', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Create Account';
            }
        });

        // Forgot password functionality
        const forgotPasswordLink = document.getElementById('forgot-password-link');
        const forgotPasswordForm = document.getElementById('forgot-password-form');
        const loginForm = document.getElementById('login-form');
        const backToLoginLink = document.getElementById('back-to-login-link');

        forgotPasswordLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'none';
            forgotPasswordForm.style.display = 'block';
            clearMessages();
        });

        backToLoginLink.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.style.display = 'block';
            forgotPasswordForm.style.display = 'none';
            clearMessages();
        });

        document.getElementById('reset-button').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value.trim();
            const button = document.getElementById('reset-button');

            if (!email) {
                showMessage('reset-message', 'Please enter your email address.', 'error');
                return;
            }

            button.disabled = true;
            button.textContent = 'Sending...';

            try {
                const { error } = await db.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/landing.html'
                    });

                if (error) {
                    showMessage('reset-message', error.message, 'error');
                } else {
                    showMessage('reset-message', 'Password reset link sent! Check your email.', 'success');
                    document.getElementById('reset-email').value = '';
                }
            } catch (error) {
                showMessage('reset-message', 'An unexpected error occurred. Please try again.', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Send Reset Link';
            }
        });

        function showRecoveryForm() {
            document.querySelector('.auth-tabs').style.display = 'none';
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('new-password-form').style.display = 'block';
        }

        // Handle password recovery link (user arrives from reset email)
        if (window.location.hash.includes('type=recovery')) {
            showRecoveryForm();
        }

        db.auth.onAuthStateChange(async (event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                showRecoveryForm();
            }
        });

        document.getElementById('new-password-button').addEventListener('click', async () => {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('new-password-confirm').value;
            const button = document.getElementById('new-password-button');

            if (password.length < 6) {
                showMessage('new-password-message', 'Password must be at least 6 characters.', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('new-password-message', 'Passwords do not match.', 'error');
                return;
            }

            button.disabled = true;
            button.textContent = 'Updating...';

            try {
                const { error } = await db.auth.updateUser({ password });
                if (error) {
                    showMessage('new-password-message', error.message, 'error');
                } else {
                    showMessage('new-password-message', 'Password updated! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                }
            } catch (err) {
                showMessage('new-password-message', 'An unexpected error occurred.', 'error');
            } finally {
                button.disabled = false;
                button.textContent = 'Update Password';
            }
        });

        // Initialize app
        checkExistingSession();
    </script>
</body>
</html>
